  <script type="text/javascript" charset="utf-8">
    var xmlh;
    // localStorage.removeItem('isNeedEncrypt')
    // 生产环境会从portal获取 后存在浏览器缓存 其他微应用无需再重新获取
    if (!localStorage.getItem("isNeedEncrypt")) {
      if (window.XMLHttpRequest) {
        //  IE7+, Firefox, Chrome, Opera, Safari 浏览器执行代码
        xmlh = new XMLHttpRequest();
      } else {
        // IE6, IE5 浏览器执行代码
        xmlh = new ActiveXObject("Microsoft.XMLHTTP");
      }
      xmlh.open("GET", '/am/rest/validate/getNeedEncrypt', false)
      xmlh.onreadystatechange = function () {
        if (xmlh.readyState == 4 && xmlh.status == 200) {
          var resData = JSON.parse(xmlh.responseText);
          console.log("加密开关", resData.resultValue)
          localStorage.setItem('isNeedEncrypt', resData.resultValue)
        }
      }
      xmlh.send()
    }

  </script>
